<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-switch" title="Cambiar modo claro/oscuro">
        <input type="checkbox" id="theme-toggle" aria-label="Alternar modo claro/oscuro" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- Pantalla de inicio -->
    <div id="start-screen" class="overlay hidden">
      <div class="overlay-box start-box">
        <p class="start-title">TETRIS</p>
        <div id="start-scores"></div>
        <div id="start-stats" class="start-stats hidden">
          <span>Mejor combo: <strong id="stat-combo">0</strong> líneas</span>
          <span>Máx. líneas: <strong id="stat-maxlines">0</strong></span>
        </div>
        <div class="start-actions">
          <button id="play-btn">Jugar</button>
          <button id="reset-scores-btn" class="btn-danger">Borrar records</button>
        </div>
      </div>
    </div>

    <!-- Game over / pausa -->
    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="name-entry" class="hidden">
          <p class="name-prompt">¡Nuevo récord! Tu nombre:</p>
          <input type="text" id="player-name" maxlength="12" placeholder="Anónimo" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <div id="overlay-scores"></div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
